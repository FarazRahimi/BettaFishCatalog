<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Betta Fish Catalog | Home</title>
    <meta name="description" content="A Catalog of Betta Fish" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Betta Fish Catalog</h1>
      <div class="filter-row">
        <input id="searchInput" type="text" placeholder="Search by name" title="Search by name" />
        <details class="filters-dropdown">
          <summary>Filters</summary>
          <div class="filters-panel">
            <div class="price-filter" title="Filter by price range">
              <span id="priceRangeLabel">$0 - $0</span>
              <div class="slider-wrap">
                <div class="slider-track"></div>
                <div id="sliderRangeFill"></div>
                <input id="minPriceFilter" type="range" min="0" max="100" value="0" title="Minimum price" />
                <input id="maxPriceFilter" type="range" min="0" max="100" value="100" title="Maximum price" />
              </div>
            </div>
            <select id="colorFilter" title="Filter by color">
              <option value="all">All Colors</option>
            </select>
            <select id="careFilter" title="Filter by care level">
              <option value="all">All Care Levels</option>
            </select>
          </div>
        </details>
      </div>
    </header>
    <div id="catalogGrid">
      <div id="card-container"></div>
    </div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>TV Show Title</h2>
        <img src="" alt="TV Show Poster" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Learn a fact about Bettas!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
