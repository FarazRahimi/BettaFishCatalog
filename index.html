<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Betta Fish Catalog | Home</title>
    <meta name="description" content="A Catalog of Betta Fish" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Betta Fish Catalog</h1>
    </header>
    <div id="catalogGrid">
      <div id="card-container"></div>
    </div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>TV Show Title</h2>
        <img src="" alt="TV Show Poster" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
